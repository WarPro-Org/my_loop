name: Auto Assign
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: 'Auto-assign issue'
      # Pinned to a full commit SHA (v1) so a retagged/compromised release
      # cannot run with issues:write + pull-requests:write. Bump deliberately.
      uses: pozil/auto-assign-issue@d11e715efc663fe323c3d8d4d3cbbfdddd539baf # v1
      with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: ProManXi
          numOfAssignee: 1
