name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main, master]
  workflow_dispatch: # It unlocks manual terminal and UI execution.

jobs:
  backend:
    name: Backend (.NET API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore api/MyLoop.Api/MyLoop.Api.csproj

      - name: Build
        run: dotnet build api/MyLoop.Api/MyLoop.Api.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/MyLoop.Api.Tests/MyLoop.Api.Tests.csproj --configuration Release

  mobile:
    name: Mobile (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        continue-on-error: true
        run: flutter test

  # ADD THIS NEW JOB TO UNBLOCK YOUR GITHUB PRs
  security-scan:
    name: Security Code Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to upload results to the Security tab
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'csharp' # Scan your .NET 10 API code for vulnerabilities

      # CodeQL needs to see a build happen for compiled languages like C#
      - name: Setup .NET 10 for Scan
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build API for Scan
        run: |
          dotnet restore api/MyLoop.Api/MyLoop.Api.csproj
          dotnet build api/MyLoop.Api/MyLoop.Api.csproj --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
